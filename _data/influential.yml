- img: "3-518-36579-7"
  title: "Das Glasperlenspiel"
  added: 2024-07-14
  description: >-
    Die Komplexität und Vielseitigkeit der Erzählung und der Charaktere hat mich sehr beeindruckt. Die Art, wie das Buch ein Leben von Anfang bis Ende umfasst, und das Gedicht, das dieses Leben beschreibt, haben mich zum ersten Mal begreifen lassen, warum Menschen Gedichte so wertschätzen. Das Buch hat mich wirklich sehr berührt und beschäftigt - ich kann nicht genau sagen, warum. Es hat mich beispielsweise dazu gebracht, sporadisch Tagebuch zu führen, um ein besseres Gefühl dafür zu bekommen, wie sehr ich mich verändere.
  book: true


- img: "978-3-257-22535-8"
  title: "Der Richter und sein Henker"
  added: 2024-06-14
  book: true
  description: >-
    Ich bin ein großer Dürrenmatt-Fan und finde, dies ist sein bestes Werk. Der Gegensatz zwischen einem absoluten, morallos nihilistischen Charakter und dem von diesem besessenen Polizisten ist brilliant. Insbesondere die Frage, wie weit er geht, um sein Lebensziel zu erreichen, fasziniert mich.

- img: "978-0-140-07615-8"
  title: "Flatland: A Romance of Many Dimensions by A. Square"
  added: 2025-12-25
  book: true
  description: >-
    This book impressively achieves two things, both inviting the reader to reconsider the limits of their perception:  First, it is a satire of Victorian society; while I cannot judge the quality or accuracy of that satire, it is nonetheless fascinating to read a work aimed at a world that no longer exists. In this way the novel offers a new window onto a culture that is otherwise unintelligible to us, and it does so in an unconventional manner. The second achievement is that most of the story takes place in two‑dimensional space, thereby challenging the way we perceive reality. It vividly shows how unimaginable three‑dimensional space would be to a 2‑D creature, and, by extension, highlights our own difficulty in visualising dimensions beyond the familiar three.

- img: "978-3-548-06041-5"
  title: "Factfullness"
  book: true
  added: 2026-04-01
  description: >-
    Das Buch hat mich sehr beeindruckt, weil es wie wenige Bücher versucht am global-gesellschaftlichen Gesamtbild zu rütteln und das auch gut schafft. Man darf das Buch nicht missverstehen als "Alles wird besser, macht nur so weiter" (als Beispiel nennt das Buch den immer noch sehr relevanten, aber leider aus dem Diskussionalltag verschwundenen Klimawandel (bei dem aber auch Dinge passieren, siehe Speicherausbau)), sondern stattdessen als Korrekturbrille, die (wenn man es so lesen will) es erst ermöglicht zielgerichtet an Schwachstellen zu arbeiten. Ganz entschieden tritt er dabei auch immer dem Bild des "Wir müssen den Armen in XY" helfen entgegen und betont anekdotische deren eigene Perspektive und vorallem Ausblick. Die ersten Kapitel ziehen sich zwar etwas, insbesondere wenn man schon ein wenig Verständnis für das lesen von Statistiken hat, aber danach ist es wirklich Gold wert! Insbesondere hat es mir auch noch mal mit der (in meinem "Milieu" sehr verbreiteten) Kapitalismuskritik zu denken gegeben. Kapitalismus kann sehr gut Skaleneffekte nutzbar machen und das eben auch im Bereich Infrastruktur und Lebensqualität. Dabei geht es natürlich nicht um einen Manchesterkapitalismus und das Buch ist kein Plädoyer für Kapitalismus per se, aber zeigt doch eindrucksvoll das man in manchen Dingen die Kraft des "aktuellen" Systems unterschätzt (solange es Impulse (bspw. Förderung) in die richtige Richtung und keine *brutale* Unterdrückung gibt). Muss ich auf jeden Fall noch mal mehr drüber nachdenken. Zentrales Element ist dabei immer der Nachweis das es nicht "wir" und "die" gibt, sondern es viel mehr ein fließender Übergang in bspw. Lebensqualität ist. Spannend fände ich es die Autoren zu fragen, wie sie es den Ertragen können das Kinderarbeit und schreckliche Arbeitsbedingungen bei uns billige Kleider produzieren. Ich nehme an, die Antwort wäre in etwa "Natürlich ist das schrecklich, aber hoffentlich ist das nur eine kurze Zwischenstufe, die diese Länder schneller durchlaufen, als unsere eigenen Länder es haben." Und wenn das wirklich stimmt, dann rechtfertigt das immer noch nicht den Kauf billiger Kleidung (man könnte das ja noch mehr beschleunigen), aber senkt hoffentlich mittelfristig die Anzahl der Menschen in extremer Armut auf nahe 0. Ich merke ich habe noch einige Dissonanzen zwischen dem Buch und meinem Weltbild (und auch diesem Text), aber ich werde mich langsam an ihnen abarbeiten. Apropo: Ich finde hierbie übertreibt das Buch immer mal wieder und arbeitet sich an Journalisten und "den Medien" ab.

- img: "978-0-470-22905-7"
  title: "The Annotated Turing"
  added: 2024-12-01
  book: true
  description: >-
   This book makes Turing's original paper very accessible. It is extremely interesting to see the roots of a fundamental concept of computer science. Especially the differences between the 'original' Turing machines and Turing machines as used in my lectures were fascinating.

   The machines Turing is interested in are 'circle free', meaning in particular they never halt or get stuck in alternating writes but continue to write a number forever. For instance, a machine for ever writing pi. While the Turing machines I am used to are supposed to halt and solve algorithmic problems, instead of 'merely' computing numbers.

   The book showed the origins of lambda calculus and the historical backgrounds of these concepts (such as the people and the papers involved). It also touched on other foundations such as first-order logic and the difference between intuitionists and formalists.

   In contrast to all explanations of Turing's achievements, this provided an actual explanation. Not only do most other explanations leave out the transition between Turing machines and first-order logic and Turing's argumentation that Turing machines actually do what is considered as 'computing', but they also leave out that actually Alonzo Church was the first to show there are no general concepts to solve all algebraic problems.

   It also caused me to struggle with the concept of real numbers and their usefulness (as opposed to computable numbers) and the law of excluded middle. I am still struggling to regain my footing, but it definitely extended my grasp on what numbers actually are and how weird the continuum is.

- img: "978-0-55299704-1"
  title: "A short history of nearly everything"
  book: true
  description: >-
    While it has been a while that I read this book, I still remember how impressed I was from the sheer range of topics covered but also how every seemingly dull scientific discipline appears as something thorougly interesting. I can really recommend this book both as a good read and to spark general interest in many topics.

- img: "978-0-141-39546-3"
  tittle: "Essays by George Orwell"
  book: true
  description: >-
    While many essays listed in this book are not that interesting for the readers not familiar with British 20. century writers there are sill many many excellent and thoughtprovoking essays to be found: My country left or right, The lion and the unicorn, Antisemitism in Britain and Notes on Nationalism to name just a few. Often posing a different perspective on society and the life of the individual or interesting autobiographical details. I was especially interested in reading the Essays written about or during WWII in which George Orwells struggle on his relationship to Britain can be seen.

- img: "https://images.igdb.com/igdb/image/upload/t_cover_big/co2una.webp"
  link: "https://www.igdb.com/games/horizon-zero-dawn"
  title: "Horizon Zero Dawn"
  added: 2025-12-01
  description: >-
    Ich glaube, was mich daran am meisten fasziniert hat, ist das für mich völlig neue Medienformat. Zwar habe ich durchaus immer wieder Computerspiele gespielt, aber nie eines, das eine Geschichte erzählen wollte. Das tut Horizon Zero Dawn in beeindruckender Weise, in allen Facetten: Sprache, Mimik, Kleidung, Umgebung und Wetter. Hinzu kommt, dass man frei entscheiden kann, was einen interessiert: Ob man über die Lebensweise dieses Volkes mehr lernen möchte oder die Geschichte dieser Person – oder eben auch nicht.

    Die Erzählweise ist unglaublich packend und vielschichtig; sie schafft es wirklich gut zu erklären, warum die Welt im Spiel so ist, wie sie ist. Auch wenn die Geschichte selbst sehr unwahrscheinlich wird, da das Spielkonzept es nötig macht, dass „alles“ nur von einer einzigen Person erreicht wird – nämlich dem Charakter des Spielers.

    Horizon Zero Dawn ist wahrscheinlich schon ein sehr gutes Spiel dieses Typs, weshalb ich auch von einem Freund dazu überzeugt wurde. Ehrlicherweise muss man jedoch sagen, dass meine Faszination für dieses Spiel zu einem großen Teil daherkommt, dass mir der Typus eines solchen Spiels nicht bekannt war. Ein genauso gutes Spiel, das ich jetzt spiele, würde mich wahrscheinlich nicht mehr so stark faszinieren.

    Ich kann es allen Menschen empfehlen, die an neuen Wegen interessiert sind, Geschichten zu erzählen.

# A hitchikers guide to the galaxy